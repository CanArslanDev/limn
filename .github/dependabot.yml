version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(ci)"
    labels:
      - dependencies
      - github-actions
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: "chore(deps)"
    labels:
      - dependencies
      - npm
    open-pull-requests-limit: 5
    ignore:
      # Bump provider SDKs deliberately, not weekly. Versions are pinned in
      # peerDependencies so a dependabot bump of devDependencies should not
      # silently shift our public surface.
      - dependency-name: "@anthropic-ai/sdk"
      - dependency-name: openai
      # Zod is pinned (not ranged) due to a vitest+ESM namespace re-export
      # bug in Zod 3.25.x where `import { z } from "zod"` resolves to a
      # shape that lacks `.object` under vitest. Bump deliberately after
      # confirming the pinned vitest can import the new Zod.
      - dependency-name: zod
    groups:
      build-tooling:
        patterns:
          - tsup
          - typescript
          - "@biomejs/*"
      test-tooling:
        patterns:
          - vitest
          - "@vitest/*"
      types:
        patterns:
          - "@types/*"
